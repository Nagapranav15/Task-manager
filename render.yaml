services:
  - type: web
    name: task-tracker-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 8080
      - key: MONGO_URL
        sync: false  # Will prompt the user to paste their connection string
      - key: JWT_SECRET
        generateValue: true  # Generates a random secure key automatically
      - key: ADMIN_INVITE_TOKEN
        value: "011516"
      - key: GOOGLE_CLIENT_ID
        sync: false  # Will prompt the user if they use Google Login
      - key: CLIENT_URL
        sync: false  # Will prompt the user to paste their Vercel frontend URL
